<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Forza 4 - GMZ</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🟠</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body class="bg-dark text-white h-[100dvh] w-full overflow-hidden flex flex-col items-center pt-safe pb-safe px-4 no-scrollbar">

    <header class="text-center mt-4 mb-2 shrink-0">
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">FORZA 4</h1>
        <div id="status-box" class="text-gray-400 text-xs mt-1 font-semibold uppercase tracking-widest">Inizializzazione...</div>
        <button id="btn-retry" onclick="window.location.reload()" class="hidden mt-2 text-brand-hot font-bold underline text-sm">Riprova Connessione</button>
    </header>

    <main id="setup-panel" class="flex-grow flex flex-col items-center w-full max-w-lg hidden overflow-y-auto no-scrollbar">
        <div id="host-section" class="bg-gray-800 p-6 rounded-2xl w-full mb-4 shadow-lg border border-gray-700">
            <h2 id="my-id" class="text-4xl font-black text-center text-white tracking-widest mb-4">----</h2>
            <div class="bg-white p-2 rounded-xl mb-4 flex justify-center"><div id="qrcode-box"></div></div>
            <button id="btn-copy" onclick="copyLink()" class="w-full py-3 rounded-xl font-bold bg-gray-700 hover:bg-gray-600 transition-all flex justify-center items-center gap-2">
                <i class="fa-solid fa-link"></i> Copia Link
            </button>
        </div>
        <div id="guest-section" class="bg-gray-800 p-6 rounded-2xl w-full shadow-lg border border-gray-700">
            <input type="text" id="remote-id" placeholder="Codice Host" maxlength="4" class="w-full bg-gray-900 text-white px-4 py-3 rounded-xl border border-gray-600 text-center font-bold text-xl mb-3 outline-none">
            <button id="btn-connect" onclick="connectToPeer()" class="w-full py-3 rounded-xl font-bold bg-emerald-600 hover:bg-emerald-500 transition-all">GIOCA</button>
        </div>
    </main>

    <div id="game-area" class="flex flex-col items-center w-full max-w-lg hidden overflow-y-auto no-scrollbar mt-2">
        <div class="bg-gray-800 px-6 py-2 rounded-full mb-4 flex items-center gap-3 border border-gray-700 shrink-0">
            <span id="player-indicator-dot" class="w-4 h-4 rounded-full shadow-inner transition-opacity duration-300"></span>
            <span id="turn-text" class="font-bold text-lg transition-opacity duration-300">Attendi...</span>
        </div>

        <div class="relative inline-block shrink-0">
            <div id="board-overlay" class="absolute inset-0 z-10 hidden flex-col items-center justify-center transition-all duration-500 overflow-hidden pointer-events-none" style="border-radius: 16px;">
                <h2 id="overlay-text"></h2>
            </div>
            <div id="board" class="board"></div>
        </div>

        <div class="mt-6 mb-6 flex flex-col w-full max-w-xs gap-3 shrink-0">
            <button id="btn-restart" onclick="requestRestart()" class="w-full py-4 rounded-xl font-bold text-lg bg-emerald-600 text-white shadow-lg active:scale-95 transition-transform hidden">
                <i class="fa-solid fa-rotate-right mr-2"></i> GIOCA ANCORA
            </button>
            <button onclick="exitToMenu()" class="w-full py-3 rounded-xl font-bold text-sm bg-gray-800 border border-gray-700 text-gray-400 hover:text-red-400 active:scale-95 transition-colors">
                <i class="fa-solid fa-door-open mr-2"></i> ESCI
            </button>
        </div>
    </div>
</body>
</html>
