<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Forza 4 - GMZ Base</title>
    
    <!-- Favicon Vettoriale con Emoji Scacchi -->
    <link class="rounded-full" rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🟠</text></svg>">
    
    <!-- Meta tag iOS/Android stabili -->
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        brand: {
                            hot: '#ef4444', love: '#ec4899', situazioni: '#f59e0b',
                            imbarazzo: '#8b5cf6', social: '#0ea5e9', confini: '#10b981'
                        },
                        dark: '#0f172a'
                    }
                }
            }
        }
    </script>
    
    <!-- Icone FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Stili Customizzati -->
    <link rel="stylesheet" href="style.css">
    
    <!-- PeerJS e QRCode tramite CDN sicura -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
    
    <!-- Logica di gioco principale -->
    <script src="app.js" defer></script>
</head>
<body class="bg-dark text-white h-[100dvh] w-full overflow-hidden select-none font-sans flex flex-col items-center pt-safe pb-safe px-6 no-scrollbar">

    <!-- Pulsante indietro alla GMZ Arcade Base (Visibile solo nel setup) -->
    <a id="btn-back-hub" href="../index.html" class="absolute top-6 left-6 w-12 h-12 rounded-2xl bg-gray-800/80 border border-gray-700/50 flex items-center justify-center text-gray-300 hover:text-white hover:border-gray-500 hover:bg-gray-700 transition-all active:scale-90 shadow-lg z-30">
        <i class="fa-solid fa-house text-lg"></i>
    </a>

    <!-- INTESTAZIONE GIOCO -->
    <header class="text-center mt-20 mb-4 shrink-0">
        <h1 class="text-5xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">
            FORZA 4
        </h1>
        <div id="status-box" class="text-gray-400 text-xs font-bold uppercase tracking-wider mt-1.5">Connessione ai server...</div>
    </header>

    <!-- SCHERMATA DI PREPARAZIONE (LOBBY/SETUP) -->
    <main id="setup-panel" class="flex-grow flex flex-col items-center w-full max-w-lg mx-auto pb-8 hidden overflow-y-auto no-scrollbar">
        
        <!-- SEZIONE HOST: genera il codice -->
        <div id="host-section" class="bg-gray-800/50 backdrop-blur-md p-6 rounded-3xl flex flex-col items-center w-full mb-6 shadow-xl border border-gray-700/50">
            <span class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mb-1">Il tuo codice Host</span>
            <h2 id="my-id" class="text-5xl font-black text-white tracking-widest mb-4">----</h2>
            
            <div class="bg-white p-3.5 rounded-2xl mb-5 shadow-inner border border-gray-200">
                <div id="qrcode-box"></div>
            </div>
            
            <button id="btn-copy" onclick="copyLink()" class="w-full py-3 rounded-xl font-bold text-base bg-gray-700/80 hover:bg-gray-700 text-white shadow-md active:scale-95 transition-transform flex justify-center items-center gap-2 border border-gray-600/30">
                <i class="fa-solid fa-link"></i> Copia Link di Invito
            </button>
        </div>

        <!-- DIVISORE INSERIMENTO CODICE -->
        <div id="divider-section" class="flex items-center w-full my-2">
            <div class="flex-grow h-px bg-gray-700/40"></div>
            <span class="px-4 text-gray-500 text-[10px] font-bold uppercase tracking-widest">Oppure partecipa</span>
            <div class="flex-grow h-px bg-gray-700/40"></div>
        </div>

        <!-- SEZIONE GUEST: inserisci codice -->
        <div id="guest-section" class="bg-gray-800/50 backdrop-blur-md p-6 rounded-3xl flex flex-col items-center w-full mt-4 shadow-xl border border-gray-700/50 transition-all">
            <div class="flex flex-col gap-3.5 w-full">
                <span id="guest-label" class="text-gray-400 text-xs font-bold uppercase tracking-widest text-center hidden mb-2">Partecipazione in corso</span>
                <input type="text" id="remote-id" placeholder="Es. A1B2" maxlength="4" class="w-full bg-gray-900/60 text-white px-4 py-3.5 rounded-xl border border-gray-600/50 uppercase text-center font-black text-2xl outline-none focus:border-indigo-500 focus:bg-gray-900 transition-colors placeholder-gray-600">
                <button id="btn-connect" onclick="connectToPeer()" class="w-full py-4 px-6 rounded-xl font-black text-lg bg-gradient-to-r from-green-400 to-emerald-600 text-white shadow-lg shadow-emerald-500/20 active:scale-95 transition-transform uppercase tracking-wider">
                    PARTECIPA ADESSO
                </button>
            </div>
        </div>
    </main>

    <!-- AREA DI GIOCO ATTIVA -->
    <div id="game-area" class="flex flex-col items-center w-full max-w-lg hidden overflow-y-auto no-scrollbar mt-2">
        
        <!-- Turno Attivo -->
        <div class="bg-gray-800 px-6 py-2.5 rounded-full mb-5 flex items-center gap-3.5 shadow-lg border border-gray-700/30 shrink-0">
            <span id="player-indicator-dot" class="w-3.5 h-3.5 rounded-full shadow-inner transition-opacity duration-300"></span>
            <span id="turn-text" class="font-extrabold text-base tracking-wide uppercase transition-opacity duration-300">Caricamento...</span>
        </div>

        <!-- Griglia Forza 4 con Overlay -->
        <div class="relative inline-block shrink-0">
            <div id="board-overlay" class="absolute inset-0 z-10 hidden flex-col items-center justify-center transition-all duration-500 overflow-hidden pointer-events-none" style="border-radius: 16px;">
                <h2 id="overlay-text" class="overlay-text-base"></h2>
            </div>
            <div id="board" class="board transition-all duration-500"></div>
        </div>

        <!-- Pulsanti di Controllo in partita -->
        <div class="mt-6 mb-6 flex flex-col w-full max-w-xs gap-3 shrink-0">
            <button id="btn-restart" onclick="requestRestart()" class="w-full py-4 rounded-xl font-black text-lg bg-gradient-to-r from-green-400 to-emerald-600 text-white shadow-lg shadow-emerald-500/20 active:scale-95 transition-transform hidden flex justify-center items-center gap-2 uppercase tracking-wide">
                <i class="fa-solid fa-rotate-right"></i> GIOCA ANCORA
            </button>

            <button onclick="exitToMenu()" class="w-full py-3.5 rounded-xl font-extrabold text-xs bg-gray-800/80 border border-gray-700/50 hover:bg-gray-700 text-gray-400 hover:text-red-400 shadow-md active:scale-95 transition-colors flex justify-center items-center gap-2 uppercase tracking-wider">
                <i class="fa-solid fa-door-open"></i> ESCI DALLA PARTITA
            </button>
        </div>
    </div>

</body>
</html>
