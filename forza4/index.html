<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Forza 4</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🟠</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        brand: {
                            hot: '#ef4444', love: '#ec4899', situazioni: '#f59e0b',
                            imbarazzo: '#8b5cf6', social: '#0ea5e9', confini: '#10b981'
                        },
                        dark: '#0f172a'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body class="bg-dark text-white h-[100dvh] w-full overflow-hidden select-none font-sans flex flex-col items-center pt-safe pb-safe px-4 no-scrollbar">

    <header class="text-center mt-4 mb-2 shrink-0">
        <h1 class="text-5xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500">
            FORZA 4
        </h1>
        <div id="status-box" class="text-gray-400 text-sm mt-1 font-semibold">Connessione ai server...</div>
    </header>

    <main id="setup-panel" class="flex-grow flex flex-col items-center w-full max-w-lg mx-auto pb-8 hidden overflow-y-auto no-scrollbar">
        
        <div id="host-section" class="bg-gray-800 p-6 rounded-2xl flex flex-col items-center w-full mb-6 shadow-lg border border-gray-700">
            <span class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-1">Il tuo codice Host</span>
            <h2 id="my-id" class="text-5xl font-black text-white tracking-widest mb-4">----</h2>
            
            <div class="bg-white p-3 rounded-xl mb-4">
                <div id="qrcode-box"></div>
            </div>
            
            <button id="btn-copy" onclick="copyLink()" class="w-full py-3 rounded-xl font-bold text-lg bg-gray-700 hover:bg-gray-600 text-white shadow-md active:scale-95 transition-transform flex justify-center items-center gap-2">
                <i class="fa-solid fa-link"></i> Copia Link di Invito
            </button>
        </div>

        <div id="divider-section" class="flex items-center w-full my-2">
            <div class="flex-grow h-px bg-gray-700"></div>
            <span class="px-4 text-gray-500 text-xs font-bold uppercase tracking-widest">Oppure partecipa</span>
            <div class="flex-grow h-px bg-gray-700"></div>
        </div>

        <div id="guest-section" class="bg-gray-800 p-6 rounded-2xl flex flex-col items-center w-full mt-4 shadow-lg border border-gray-700 transition-all duration-300">
            <div class="flex flex-col gap-3 w-full">
                <span id="guest-label" class="text-gray-400 text-xs font-bold uppercase tracking-widest text-center hidden mb-2">Partecipazione in corso</span>
                <input type="text" id="remote-id" placeholder="Es. A1B2" maxlength="4" class="w-full bg-gray-900 text-white px-4 py-3 rounded-xl border border-gray-600 uppercase text-center font-bold text-xl outline-none focus:border-brand-love transition-colors">
                <button id="btn-connect" onclick="connectToPeer()" class="w-full py-3 px-6 rounded-xl font-bold text-lg bg-gradient-to-r from-green-400 to-emerald-600 text-white shadow-lg shadow-emerald-500/30 active:scale-95 transition-transform">
                    GIOCA
                </button>
            </div>
        </div>
    </main>

    <div id="game-area" class="flex flex-col items-center w-full max-w-lg hidden overflow-y-auto no-scrollbar mt-2">
        
        <div class="bg-gray-800 px-6 py-2 rounded-full mb-4 flex items-center gap-3 shadow-lg border border-gray-700 shrink-0">
            <span id="player-indicator-dot" class="w-4 h-4 rounded-full shadow-inner transition-opacity duration-300"></span>
            <span id="turn-text" class="font-bold text-lg transition-opacity duration-300">Caricamento...</span>
        </div>

        <div class="relative inline-block shrink-0">
            <div id="board-overlay" class="absolute inset-0 z-10 hidden flex-col items-center justify-center transition-all duration-500 overflow-hidden pointer-events-none" style="border-radius: 16px;">
                <h2 id="overlay-text"></h2>
            </div>
            <div id="board" class="board transition-all duration-500">
                </div>
        </div>

        <div class="mt-6 mb-6 flex flex-col w-full max-w-xs gap-3 shrink-0">
            <button id="btn-restart" onclick="requestRestart()" class="w-full py-4 rounded-xl font-bold text-lg bg-gradient-to-r from-green-400 to-emerald-600 text-white shadow-lg shadow-emerald-500/30 active:scale-95 transition-transform hidden flex justify-center items-center gap-2">
                <i class="fa-solid fa-rotate-right"></i> GIOCA ANCORA
            </button>

            <button onclick="exitToMenu()" class="w-full py-3 rounded-xl font-bold text-sm bg-gray-800 border border-gray-700 hover:bg-gray-700 text-gray-400 hover:text-red-400 shadow-md active:scale-95 transition-colors flex justify-center items-center gap-2">
                <i class="fa-solid fa-door-open"></i> ESCI DALLA PARTITA
            </button>
        </div>
    </div>

</body>
</html>
