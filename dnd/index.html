<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Duce o Non Duce - GMZ Base</title>
    
    <!-- Favicon Vettoriale con Emoji Scettica -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧐</text></svg>">
    
    <!-- Meta tag iOS/Android stabili -->
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Google Fonts (Poppins per uniformità) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        dark: '#0f172a',
                        brand: {
                            hot: '#ef4444',       // Red-500
                            love: '#ec4899',      // Pink-500
                            situazioni: '#f59e0b',// Amber-500
                            imbarazzo: '#8b5cf6', // Violet-500
                            social: '#0ea5e9',    // Sky-500
                            confini: '#10b981'    // Emerald-500
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Icone FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        .pt-safe { padding-top: env(safe-area-inset-top, 15px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 15px); }
        
        button {
            touch-action: manipulation;
        }
    </style>
</head>
<body class="bg-dark text-white min-h-[100dvh] w-full font-sans flex flex-col items-center justify-center pt-safe pb-safe px-6 select-none">

    <!-- Pulsante indietro standardizzato alla GMZ Arcade Base -->
    <a id="btn-back-hub" href="../index.html" class="absolute top-6 left-6 w-12 h-12 rounded-2xl bg-gray-800/80 border border-gray-700/50 flex items-center justify-center text-gray-300 hover:text-white hover:border-gray-500 hover:bg-gray-700 transition-all active:scale-90 shadow-lg z-30">
        <i class="fa-solid fa-house text-lg"></i>
    </a>

    <!-- AREA GIOCO PRINCIPALE -->
    <main id="game-screen" class="w-full max-w-md flex flex-col items-center hidden">
        
        <!-- Intestazione stilizzata -->
        <header class="mb-6 w-full text-center mt-12">
            <h1 class="text-4xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-amber-500 to-indigo-500 drop-shadow-lg leading-tight uppercase">
                Duce o ИOИ D∩CE
            </h1>
            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mt-1">Chi ha pronunciato questa frase?</p>
        </header>

        <!-- Contatore e Punteggio -->
        <div class="w-full flex justify-between text-gray-400 font-bold mb-3 px-2 text-sm uppercase tracking-wider">
            <span>Domanda: <span id="question-counter" class="text-brand-social font-black text-base">1</span>/20</span>
            <span>Punti: <span id="score-display" class="text-brand-confini font-black text-base">0</span></span>
        </div>

        <!-- Box Citazione -->
        <div class="w-full bg-gray-800/60 backdrop-blur-md border border-gray-700/50 rounded-[2rem] p-6 shadow-2xl flex flex-col items-center min-h-[260px] justify-center relative">
            <p id="quote-text" class="text-xl md:text-2xl text-center font-bold leading-relaxed text-gray-100 italic">
                "Caricamento..."
            </p>
            
            <!-- Box Spiegazione / Contesto (Visibile in entrambi i casi dopo il click) -->
            <div id="explanation-box" class="hidden w-full mt-5 p-4 rounded-2xl border border-gray-700/50 bg-gray-950/80 max-h-[160px] overflow-y-auto no-scrollbar">
                <span id="explanation-title" class="block text-xs font-extrabold uppercase tracking-widest mb-1"></span>
                <p id="explanation-text" class="text-gray-400 text-xs leading-relaxed font-medium"></p>
            </div>
        </div>

        <!-- Pulsanti Risposta -->
        <div class="w-full flex gap-4 mt-6">
            <button id="btn-duce" onclick="handleAnswer(true)" class="flex-1 bg-gray-800 border border-gray-700/60 hover:bg-gray-700/80 text-white font-extrabold text-lg py-4 rounded-2xl transition-all active:scale-95 shadow-md tracking-wider">
                DUCE
            </button>
            <button id="btn-non-duce" onclick="handleAnswer(false)" class="flex-1 bg-gray-800 border border-gray-700/60 hover:bg-gray-700/80 text-white font-extrabold text-lg py-4 rounded-2xl transition-all active:scale-95 shadow-md tracking-wider">
                NON DUCE
            </button>
        </div>

        <!-- Pulsante di Navigazione / Stato -->
        <div class="w-full flex flex-col gap-3 mt-4">
            <button id="btn-next" onclick="nextQuestion()" class="hidden w-full bg-gradient-to-r from-blue-400 to-indigo-600 hover:from-blue-300 hover:to-indigo-500 text-white font-black text-lg py-4 rounded-2xl transition-all active:scale-95 shadow-lg uppercase tracking-wide">
                PROSSIMA DOMANDA <i class="fa-solid fa-chevron-right ml-1"></i>
            </button>

            <!-- Tasto Abbandona / Termina Gioco Richiesto -->
            <button id="btn-terminate" onclick="endGame()" class="w-full py-3.5 rounded-2xl font-bold text-xs bg-gray-800/80 border border-gray-700/50 hover:bg-gray-700 text-gray-400 hover:text-red-400 shadow-md active:scale-95 transition-colors flex justify-center items-center gap-2 uppercase tracking-wider">
                <i class="fa-solid fa-flag text-[10px]"></i> Termina Partita
            </button>
        </div>
    </main>

    <!-- SCHERMATA CONCLUSIVA (END SCREEN) -->
    <section id="end-screen" class="hidden w-full max-w-md flex flex-col items-center justify-center text-center">
        
        <div class="inline-block p-4 rounded-3xl bg-gray-800/60 mb-5 border border-gray-700/50 shadow-lg">
            <i class="fa-solid fa-trophy text-5xl text-yellow-500"></i>
        </div>
        
        <h2 class="text-4xl font-black mb-2 text-white uppercase tracking-tight">PARTITA CONCLUSA</h2>
        <p class="text-gray-400 text-sm font-semibold mb-6">Ottimo tentativo, ecco il tuo resoconto</p>
        
        <div class="bg-gray-800/60 backdrop-blur-md border border-gray-700/50 rounded-[2rem] p-8 shadow-2xl w-full mb-6">
            <p class="text-gray-400 text-xs font-extrabold uppercase tracking-widest mb-3">Punteggio Finale</p>
            <p class="text-7xl font-black text-brand-confini drop-shadow-[0_0_15px_rgba(16,185,129,0.3)]">
                <span id="final-score">0</span><span class="text-4xl text-gray-500 font-bold">/20</span>
            </p>
        </div>
        
        <button onclick="startGame()" class="w-full bg-gradient-to-r from-green-400 to-emerald-600 hover:from-green-300 hover:to-emerald-500 text-white font-black text-lg py-4 rounded-2xl transition-all active:scale-95 shadow-lg uppercase tracking-wide">
            GIOCA DI NUOVO <i class="fa-solid fa-rotate-right ml-1"></i>
        </button>
    </section>

    <!-- Script delle domande ed engine di logica -->
    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
