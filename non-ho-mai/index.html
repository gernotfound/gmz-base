<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Non Ho Mai - Il Gioco</title>
    
    <!-- Favicon Vettoriale con Emoji Scacchi -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♟️</text></svg>">
    
    <!-- PWA Manifest & Meta Tags Avanzati per Stabilità -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Non Ho Mai">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            hot: '#ef4444',       // Red-500
                            love: '#ec4899',      // Pink-500
                            situazioni: '#f59e0b',// Amber-500
                            imbarazzo: '#8b5cf6', // Violet-500
                            social: '#0ea5e9',    // Sky-500
                            confini: '#10b981'    // Emerald-500
                        },
                        dark: '#0f172a'
                    }
                }
            }
        }
    </script>
    
    <!-- FontAwesome (CDN) per icone -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-white h-[100dvh] w-screen overflow-hidden select-none font-sans flex flex-col items-center pt-safe pb-safe pl-safe pr-safe">

    <!-- SCHERMATA INIZIALE (HOME) -->
    <div id="home-screen" class="absolute inset-0 flex flex-col h-full w-full overflow-y-auto p-6 transition-opacity duration-300 z-20 bg-dark">
        
        <header class="text-center mt-8 mb-10">
            <h1 class="text-5xl font-extrabold tracking-tight mb-2 text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-violet-500">
                NON HO MAI
            </h1>
            <p class="text-gray-400 text-sm">Seleziona le categorie per iniziare a giocare</p>
        </header>

        <!-- Griglia Categorie -->
        <main class="flex-grow flex flex-col items-center w-full max-w-lg mx-auto pb-8">
            <div class="grid grid-cols-2 gap-4 w-full mb-10" id="categories-container">
                
                <label class="category-card relative flex flex-col items-center justify-center p-4 rounded-2xl bg-gray-800 border-2 border-transparent cursor-pointer transition-all" data-category="Hot">
                    <input type="checkbox" class="hidden category-checkbox" value="Hot">
                    <i class="fa-solid fa-fire text-3xl mb-2 text-brand-hot"></i>
                    <span class="font-semibold text-lg">Hot</span>
                </label>

                <label class="category-card relative flex flex-col items-center justify-center p-4 rounded-2xl bg-gray-800 border-2 border-transparent cursor-pointer transition-all" data-category="Love">
                    <input type="checkbox" class="hidden category-checkbox" value="Love">
                    <i class="fa-solid fa-heart text-3xl mb-2 text-brand-love"></i>
                    <span class="font-semibold text-lg">Love</span>
                </label>

                <label class="category-card relative flex flex-col items-center justify-center p-4 rounded-2xl bg-gray-800 border-2 border-transparent cursor-pointer transition-all" data-category="Situazioni">
                    <input type="checkbox" class="hidden category-checkbox" value="Situazioni">
                    <i class="fa-solid fa-masks-theater text-3xl mb-2 text-brand-situazioni"></i>
                    <span class="font-semibold text-lg">Situazioni</span>
                </label>

                <label class="category-card relative flex flex-col items-center justify-center p-4 rounded-2xl bg-gray-800 border-2 border-transparent cursor-pointer transition-all" data-category="Imbarazzo">
                    <input type="checkbox" class="hidden category-checkbox" value="Imbarazzo">
                    <i class="fa-solid fa-face-flushed text-3xl mb-2 text-brand-imbarazzo"></i>
                    <span class="font-semibold text-lg">Imbarazzo</span>
                </label>

                <label class="category-card relative flex flex-col items-center justify-center p-4 rounded-2xl bg-gray-800 border-2 border-transparent cursor-pointer transition-all" data-category="Social">
                    <input type="checkbox" class="hidden category-checkbox" value="Social">
                    <i class="fa-solid fa-mobile-screen text-3xl mb-2 text-brand-social"></i>
                    <span class="font-semibold text-lg text-center leading-tight">Social<br>& Guai</span>
                </label>

                <label class="category-card relative flex flex-col items-center justify-center p-4 rounded-2xl bg-gray-800 border-2 border-transparent cursor-pointer transition-all" data-category="Confini">
                    <input type="checkbox" class="hidden category-checkbox" value="Confini">
                    <i class="fa-solid fa-hand text-3xl mb-2 text-brand-confini"></i>
                    <span class="font-semibold text-lg">Confini</span>
                </label>
            </div>

            <!-- Area Avviso (Nessuna categoria selezionata) -->
            <div id="error-message" class="hidden text-red-400 font-medium mb-4 text-center px-4 py-2 bg-red-900/30 rounded-lg">
                Devi selezionare almeno una categoria!
            </div>

            <!-- Tasto Gioca -->
            <button id="btn-play" class="w-full py-4 rounded-full font-bold text-xl bg-gradient-to-r from-green-400 to-emerald-600 text-white shadow-lg shadow-emerald-500/30 transform active:scale-95 transition-transform mt-auto">
                GIOCA ORA <i class="fa-solid fa-play ml-2"></i>
            </button>
        </main>
    </div>

    <!-- SCHERMATA GIOCO -->
    <div id="game-screen" class="absolute inset-0 flex flex-col h-full w-full bg-gray-900 transition-opacity duration-300 opacity-0 pointer-events-none z-10">
        
        <!-- Area centrale per il testo (cliccabile per andare avanti) -->
        <div id="tap-area" class="flex-grow flex flex-col items-center justify-center p-8 cursor-pointer relative overflow-y-auto">
            <span id="game-category-label" class="absolute top-8 text-sm font-bold uppercase tracking-widest text-gray-500 bg-gray-800 px-4 py-1 rounded-full z-10 transition-colors duration-300">
                Categoria
            </span>
            
            <h2 id="phrase-display" class="text-3xl md:text-5xl font-bold text-center leading-tight max-w-3xl will-change-transform">
                Caricamento...
            </h2>
            
            <p class="absolute bottom-8 text-gray-600 text-xs flex items-center gap-2 pointer-events-none">
                <i class="fa-solid fa-hand-pointer"></i> Tocca per andare avanti
            </p>
        </div>

        <!-- Barra di navigazione inferiore -->
        <div class="h-20 bg-gray-800 flex items-center justify-between px-6 rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.5)] z-20 pb-safe">
            
            <button id="btn-prev" class="flex flex-col items-center justify-center p-2 text-gray-400 hover:text-white active:scale-90 transition-all w-16 disabled:opacity-50">
                <i class="fa-solid fa-chevron-left text-xl mb-1 pointer-events-none"></i>
                <span class="text-[10px] uppercase font-bold tracking-wider pointer-events-none">Indietro</span>
            </button>

            <button id="btn-exit" class="flex flex-col items-center justify-center p-2 text-red-400 hover:text-red-300 active:scale-90 transition-all w-16">
                <i class="fa-solid fa-door-open text-xl mb-1 pointer-events-none"></i>
                <span class="text-[10px] uppercase font-bold tracking-wider pointer-events-none">Esci</span>
            </button>

            <button id="btn-next" class="flex flex-col items-center justify-center p-2 text-green-400 hover:text-green-300 active:scale-90 transition-all w-16">
                <i class="fa-solid fa-chevron-right text-xl mb-1 pointer-events-none"></i>
                <span class="text-[10px] uppercase font-bold tracking-wider pointer-events-none">Avanti</span>
            </button>
            
        </div>
    </div>

    <!-- Scripts delle singole categorie -->
    <script src="data_hot.js"></script>
    <script src="data_love.js"></script>
    <script src="data_situazioni.js"></script>
    <script src="data_imbarazzo.js"></script>
    <script src="data_social.js"></script>
    <script src="data_confini.js"></script>
    
    <!-- Script logica principale -->
    <script src="app.js"></script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('Service Worker registrato con successo (Scope: ' + registration.scope + ')');
                    })
                    .catch(err => {
                        console.warn('Registrazione Service Worker fallita: ', err);
                    });
            });
        }
    </script>
</body>
</html>
